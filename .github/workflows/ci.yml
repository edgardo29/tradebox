name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ["**"]

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      python: ${{ steps.filter.outputs.python }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend and Python-stack changes
        id: filter
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ "$base_sha" =~ ^0+$ ]] || ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha")"
          fi

          frontend=false
          python=false

          while IFS= read -r changed_file; do
            case "$changed_file" in
              frontend/*)
                frontend=true
                ;;
              backend/*|pipelines/*|packages/shared_core/*)
                python=true
                ;;
              pyproject.toml|backend/pyproject.toml|pipelines/pyproject.toml|packages/shared_core/pyproject.toml)
                python=true
                ;;
              backend/alembic.ini|backend/alembic/*)
                python=true
                ;;
              .github/workflows/*)
                frontend=true
                python=true
                ;;
            esac
          done < <(git diff --name-only "$base_sha" "$head_sha")

          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for frontend package
        id: frontend_package
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.frontend_package.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        if: steps.frontend_package.outputs.exists == 'true'
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Lint frontend
        if: steps.frontend_package.outputs.exists == 'true'
        shell: bash
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No frontend lint script configured. Skipping."
          fi

      - name: Build frontend
        if: steps.frontend_package.outputs.exists == 'true'
        shell: bash
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No frontend build script configured. Skipping."
          fi

  python:
    name: Python CI
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tradebox_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tradebox_db_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/tradebox_db_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            pipelines/pyproject.toml
            packages/shared_core/pyproject.toml

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./backend[dev]"
          python -m pip install -e "./pipelines[dev]"
          python -m pip install -e "./packages/shared_core[dev]"

      - name: Compile Python files
        run: python -m compileall backend pipelines packages

      - name: Run ruff
        run: ruff check backend pipelines packages

      - name: Check import boundaries
        shell: bash
        run: |
          if grep -R -n -E "from pipelines\b|import pipelines\b" backend/src/app backend/alembic --include='*.py'; then
            echo "Backend must not import pipelines."
            exit 1
          fi

          if grep -R -n -E "from (app|backend)\b|import (app|backend)\b" pipelines/src/pipelines --include='*.py'; then
            echo "Pipelines must not import backend/app internals."
            exit 1
          fi

          if grep -R -n -E "from (app|backend|pipelines)\b|import (app|backend|pipelines)\b" packages/shared_core/src/shared_core --include='*.py'; then
            echo "shared_core must not import backend/app or pipelines internals."
            exit 1
          fi

          old_prefix="buyhigh""selllow"
          old_hyphen="buy-high-""sell-low"
          apps_prefix="apps"
          stale_pattern="${apps_prefix}/(backend|frontend|pipelines)|(from|import) ${apps_prefix}|${old_prefix}|${old_prefix}_db|${old_prefix}_db_dev|${old_hyphen}"

          if grep -R -n -E "$stale_pattern" README.md .env.example backend frontend pipelines packages .github --exclude-dir='.git' --exclude-dir='.venv'; then
            echo "Stale project path/name reference found."
            exit 1
          fi

      - name: Apply database migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Validate migration downgrade and re-upgrade
        working-directory: backend
        run: |
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -p no:cacheprovider

      - name: Run pipeline tests
        working-directory: pipelines
        run: python -m pytest -p no:cacheprovider

      - name: Run shared_core tests
        working-directory: packages/shared_core
        run: python -m pytest -p no:cacheprovider

  required:
    name: CI Required
    needs: [changes, frontend, python]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify required checks
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          PYTHON_CHANGED: ${{ needs.changes.outputs.python }}
          PYTHON_RESULT: ${{ needs.python.result }}
        shell: bash
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Change detection did not complete successfully."
            exit 1
          fi

          if [[ "$FRONTEND_CHANGED" == "true" && "$FRONTEND_RESULT" != "success" ]]; then
            echo "Frontend CI did not complete successfully."
            exit 1
          fi

          if [[ "$PYTHON_CHANGED" == "true" && "$PYTHON_RESULT" != "success" ]]; then
            echo "Python CI did not complete successfully."
            exit 1
          fi

          echo "All required CI checks passed."
