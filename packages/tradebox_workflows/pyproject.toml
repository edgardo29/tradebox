[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tradebox-workflows"
version = "0.1.0"
description = "Cross-application workflow functions for tradebox scripts and pipelines."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest==8.3.3",
  "ruff==0.7.3",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../../backend/src", "../shared_core/src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
