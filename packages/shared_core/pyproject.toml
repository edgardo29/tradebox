[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tradebox-shared-core"
version = "0.1.0"
description = "Shared trading, market-data, storage, strategy, and backtesting logic for tradebox."
requires-python = ">=3.11"
dependencies = [
  "boto3==1.35.54",
  "databento==0.79.0",
  "pydantic-settings==2.6.1",
  "polars==1.12.0",
  "pyarrow==16.1.0",
  "duckdb==1.5.4",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.3",
  "ruff==0.7.3",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
